services:
  postgres:
    image: postgres:16
    container_name: clinicnotes-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic_notes}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./backend/seeds/001_demo_seed.sql:/docker-entrypoint-initdb.d/002_demo_seed.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      BACKEND_PORT: 8080
      BACKEND_ALLOWED_ORIGINS: http://localhost:5173
      BACKEND_DATABASE_URL: postgres://clinic_user:clinic_password@postgres:5432/clinic_notes?sslmode=disable
      BACKEND_AI_PROVIDER: ${BACKEND_AI_PROVIDER:-mock}
      BACKEND_AI_BASE_URL: ${BACKEND_AI_BASE_URL:-https://api.openai.com/v1}
      BACKEND_AI_MODEL: ${BACKEND_AI_MODEL:-gpt-4o-mini}
      BACKEND_AI_API_KEY: ${BACKEND_AI_API_KEY:-}
      BACKEND_CONSULTATION_FEE: ${BACKEND_CONSULTATION_FEE:-3500}
      BACKEND_CLINIC_NAME: ${BACKEND_CLINIC_NAME:-ABC Health Clinic}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"

volumes:
  postgres_data:
